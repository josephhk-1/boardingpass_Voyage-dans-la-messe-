<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECF Airways - Digital Boarding Pass</title>
    <style>
        :root {
            --dark-blue: #0b192c;
            --card-blue: #132d5a;
            --accent-gold: #dfb56c;
            --text-light: #f3f4f6;
            --insta-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(180deg, var(--dark-blue) 0%, #1e3a8a 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* واجهة كأنها تطبيق موبايل للمطار */
        .phone-container {
            width: 100%;
            max-width: 430px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            animation: fadeInDown 0.6s ease;
        }

        .header h1 {
            font-size: 26px;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
            font-weight: 700;
            background: linear-gradient(to left, #ffffff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: #93c5fd;
            margin: 0;
            opacity: 0.9;
        }

        /* كارت معاينة التذكرة الرقمي */
        .digital-wallet-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background: rgba(11, 25, 44, 0.6);
            border: 2px solid rgba(223, 181, 108, 0.3);
            border-radius: 12px;
            font-size: 16px;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(223, 181, 108, 0.2);
            outline: none;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #b45309 100%);
            color: #1e3a8a;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(223, 181, 108, 0.3);
            transition: all 0.3s ease;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(223, 181, 108, 0.4);
        }

        /* فوتر إنستجرام ECF */
        .footer-instagram {
            margin-top: 15px;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .insta-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--insta-gradient);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(218, 39, 67, 0.4);
            transition: transform 0.3s ease;
        }

        .insta-link:hover {
            transform: scale(1.05);
        }

        #canvasContainer {
            display: none;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="phone-container">
    
    <!-- الهيدر الرقمي -->
    <div class="header">
        <h1>VOYAGE DANS LA MESSE</h1>
        <p>ECF Airways • Spiritual Terminal</p>
    </div>
    
    <!-- واجهة الكارت الرقمي المحاكي للموبايل -->
    <div class="digital-wallet-card">
        <div class="form-group">
            <label for="passengerName">Nom du Passager / اسم المسافر</label>
            <input type="text" id="passengerName" placeholder="اكتب اسمك هنا لتحديث التذكرة..." required>
        </div>
        
        <button id="generateBtn">توليد وتحميل البوردنج 🎫</button>
    </div>

    <!-- زر إنستجرام الحصري تحت الكارت -->
    <div class="footer-instagram">
        <a href="https://www.instagram.com/etudiantscoptesenfrance_ecf/" target="_blank" class="insta-link">
            <span>Suivez-nous sur Instagram @ECF 📸</span>
        </a>
    </div>

</div>

<!-- حاوية معالجة الكانفاس المخفية لطباعة الصورة بدقة -->
<div id="canvasContainer">
    <canvas id="ticketCanvas"></canvas>
</div>

<script>
    document.getElementById('generateBtn').addEventListener('click', function() {
        const name = document.getElementById('passengerName').value.trim();
        if (!name) {
            alert('من فضلك اكتب اسمك أولاً لإصدار التذكرة!');
            return;
        }

        const canvas = document.getElementById('ticketCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        // المسار الثابت للصورة الأصلية
        img.src = 'boarding_pass_bg.jpg'; 
        
        img.onload = function() {
            // الحفاظ على أبعاد وجودة الصورة الأصلية بالكامل
            canvas.width = img.width;
            canvas.height = img.height;
            
            // 1. رسم الديزاين الأصلي بكل اللوجوهات والألوان والأشعة
            ctx.drawImage(img, 0, 0);
            
            // 2. تعديل الإحداثيات والخط ليكون فوق خط PASSENGER NAME بالظبط
            ctx.font = 'bold 36px "Segoe UI", Helvetica, Arial, sans-serif';
            ctx.fillStyle = '#ffffff'; // تغيير اللون للأبيض الناصع ليطابق الـ Vibe الرقمي المحترف
            ctx.textAlign = 'left'; // المحاذاة تبدأ من اليسار تماشياً مع الديزاين الغربي للكارت
            
            // تعديل الأبعاد بناءً على مراجعة ملف image_292a22.jpg لرفع الاسم لمكانه الصحيح تماماً
            const nameX = img.width * 0.10;  // يبدأ من اليسار بمحاذاة كلمة PASSENGER NAME
            const nameY = img.height * 0.49; // الارتفاع المثالي ليكون مستقراً فوق السطر تماماً وليس فوق الأقسام السفلية
            
            ctx.fillText(name, nameX, nameY);

            // 3. التحميل التلقائي الفوري بأعلى جودة بكسل
            const downloadLink = document.createElement('a');
            downloadLink.download = `BoardingPass_${name}.jpg`;
            downloadLink.href = canvas.toDataURL('image/jpeg', 1.0);
            downloadLink.click();
        };

        img.onerror = function() {
            alert('تأكد من حفظ صورتك بصيغة JPG وتسميتها boarding_pass_bg.jpg في نفس المجلد بجانب هذا الملف.');
        };
    });
</script>

</body>
</html>
